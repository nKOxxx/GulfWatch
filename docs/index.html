<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulf Watch — UAE Threat Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
        }
        .app { display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        .header {
            background: #12121a;
            border-bottom: 1px solid #2a2a3a;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 600; }
        .logo-icon { font-size: 20px; }
        .live-badge {
            background: #ff4444;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .region-select {
            background: #1a1a25;
            border: 1px solid #2a2a3a;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        
        /* Main */
        .main { flex: 1; display: grid; grid-template-columns: 1fr 340px; overflow: hidden; }
        #map { width: 100%; height: 100%; background: #1a1a25; }
        
        /* Sidebar */
        .sidebar {
            background: #12121a;
            border-left: 1px solid #2a2a3a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .report-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .report-btn:hover { background: #ff2222; }
        
        .alerts-section { flex: 1; overflow-y: auto; padding: 12px; }
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #a0a0b0;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        
        .alert-item {
            background: #1a1a25;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #ff4444;
        }
        .alert-item.interceptor { border-left-color: #00ff88; }
        .alert-item.siren { border-left-color: #ffaa00; }
        
        .alert-time { font-size: 10px; color: #606070; margin-bottom: 2px; }
        .alert-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
        .alert-desc { font-size: 12px; color: #a0a0b0; line-height: 1.4; }
        
        /* Leaflet custom */
        .leaflet-container { background: #0a0a0f; }
        .leaflet-popup-content { color: #000; margin: 8px 12px; font-size: 13px; }
        .leaflet-popup-content-wrapper { border-radius: 6px; }
        
        /* Custom markers */
        .marker-confirmed {
            background: #ff4444;
            border: 2px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: pulse 1.5s infinite;
        }
        .marker-interceptor {
            background: #00ff88;
            border: 2px solid white;
            border-radius: 50%;
            width: 14px;
            height: 14px;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
        }
        
        /* Stats */
        .stats-bar {
            background: #0f0f15;
            border-top: 1px solid #2a2a3a;
            padding: 8px 16px;
            display: flex;
            gap: 20px;
            font-size: 11px;
        }
        .stat { display: flex; align-items: center; gap: 4px; color: #a0a0b0; }
        .stat-value { color: #00d4ff; font-weight: 600; }
        
        /* Mobile */
        @media (max-width: 800px) {
            .main { grid-template-columns: 1fr; grid-template-rows: 55% 45%; }
            .sidebar { border-left: none; border-top: 1px solid #2a2a3a; }
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: #12121a;
            border: 1px solid #2a2a3a;
            border-radius: 10px;
            width: 100%;
            max-width: 380px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 16px;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title { font-size: 16px; font-weight: 600; }
        .modal-close {
            background: none;
            border: none;
            color: #a0a0b0;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-body { padding: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 12px; color: #a0a0b0; margin-bottom: 5px; }
        .form-select, .form-input {
            width: 100%;
            background: #1a1a25;
            border: 1px solid #2a2a3a;
            color: #fff;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-select:focus, .form-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .submit-btn {
            width: 100%;
            background: #00d4ff;
            color: #0a0a0f;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }
        .submit-btn:hover { background: #00e5ff; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <span>Gulf Watch</span>
                <span class="live-badge">LIVE</span>
            </div>
            <select class="region-select" id="regionSelect">
                <option value="dubai">Dubai</option>
                <option value="abudhabi">Abu Dhabi</option>
                <option value="bahrain">Bahrain</option>
                <option value="doha">Qatar</option>
            </select>
        </header>
        
        <main class="main">
            <div id="map"></div>
            <aside class="sidebar">
                <button class="report-btn" onclick="openModal()">
                    📡 Report
                </button>
                <div class="alerts-section">
                    <div class="section-title">Active Alerts</div>
                    <div id="alertsList"></div>
                </div>
            </aside>
        </main>
        
        <div class="stats-bar">
            <div class="stat">📍 <span class="stat-value" id="reportCount">12</span> Reports</div>
            <div class="stat">✓ <span class="stat-value">5</span> Confirmed</div>
            <div class="stat">📷 <span class="stat-value">0</span> Cameras</div>
        </div>
    </div>
    
    <!-- Report Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Report Incident</div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="reportForm">
                    <div class="form-group">
                        <label class="form-label">What did you see/hear?</label>
                        <select class="form-select" name="type" required>
                            <option value="">Select...</option>
                            <option value="explosion">💥 Explosion</option>
                            <option value="interceptor">🚀 Interceptor</option>
                            <option value="siren">🚨 Siren</option>
                            <option value="smoke">💨 Smoke/Fire</option>
                            <option value="drone">🛸 Drone</option>
                            <option value="aircraft">✈️ Aircraft</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Your Location</label>
                        <select class="form-select" name="location" required>
                            <option value="">Select area...</option>
                            <option value="palm">Palm Jumeirah</option>
                            <option value="marina">Dubai Marina</option>
                            <option value="downtown">Downtown / Burj Khalifa</option>
                            <option value="creek">Dubai Creek Harbour</option>
                            <option value="jebelali">Jebel Ali</option>
                            <option value="deira">Deira</option>
                            <option value="burdubai">Bur Dubai</option>
                            <option value="business">Business Bay</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Details</label>
                        <input type="text" class="form-input" name="details" placeholder="Direction, distance, etc.">
                    </div>
                    <button type="submit" class="submit-btn">Submit</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Region configs
        const regions = {
            dubai: { center: [25.2048, 55.2708], zoom: 11 },
            abudhabi: { center: [24.4539, 54.3773], zoom: 11 },
            bahrain: { center: [26.2285, 50.5860], zoom: 12 },
            doha: { center: [25.2854, 51.5310], zoom: 12 }
        };
        
        // Initialize map with OpenStreetMap (no API key needed)
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([25.2048, 55.2708], 11);
        
        // Dark theme tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        // Today's confirmed incidents
        const incidents = [
            { id: 1, type: 'explosion', title: 'Hotel Fire', lat: 25.1156, lng: 55.1284, desc: 'Fairmont Hotel, Palm Jumeirah — reported hit', time: '09:15', severity: 'confirmed' },
            { id: 2, type: 'explosion', title: 'Explosion', lat: 25.1412, lng: 55.1853, desc: 'Near Burj Al Arab — drone debris', time: '09:08', severity: 'confirmed' },
            { id: 3, type: 'explosion', title: 'Explosion', lat: 25.1972, lng: 55.2962, desc: 'Near Burj Khalifa — loud blast', time: '08:45', severity: 'confirmed' },
            { id: 4, type: 'explosion', title: 'Port Fire', lat: 24.9857, lng: 55.0274, desc: 'Jebel Ali Port — berth fire', time: '09:24', severity: 'confirmed' },
            { id: 5, type: 'interceptor', title: 'Air Defense', lat: 25.25, lng: 55.30, desc: 'Interceptor launches over city', time: '09:10', severity: 'interceptor' },
            { id: 6, type: 'explosion', title: 'Explosion', lat: 25.2048, lng: 55.27, desc: 'Creek Harbour area — loud blast heard', time: '09:28', severity: 'confirmed' }
        ];
        
        // Add markers
        incidents.forEach(i => {
            const iconClass = i.severity === 'interceptor' ? 'marker-interceptor' : 'marker-confirmed';
            const color = i.severity === 'interceptor' ? '#00ff88' : '#ff4444';
            
            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: `<div class="${iconClass}"></div>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });
            
            L.marker([i.lat, i.lng], { icon: customIcon })
                .addTo(map)
                .bindPopup(`<b>${i.title}</b><br>${i.desc}<br><small>${i.time}</small>`);
        });
        
        // Region switcher
        document.getElementById('regionSelect').addEventListener('change', (e) => {
            const r = regions[e.target.value];
            if (r) map.setView(r.center, r.zoom);
        });
        
        // Render alerts
        function renderAlerts() {
            const list = document.getElementById('alertsList');
            list.innerHTML = incidents.slice().reverse().map(i => `
                <div class="alert-item ${i.severity}">
                    <div class="alert-time">${i.time} — ${i.severity === 'confirmed' ? 'Confirmed' : 'Interceptor'}</div>
                    <div class="alert-title">${i.title}</div>
                    <div class="alert-desc">${i.desc}</div>
                </div>
            `).join('');
        }
        renderAlerts();
        
        // Modal
        function openModal() { document.getElementById('modal').classList.add('active'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        
        // Form
        document.getElementById('reportForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const form = e.target;
            const reports = JSON.parse(localStorage.getItem('reports') || '[]');
            reports.push({
                type: form.type.value,
                location: form.location.value,
                details: form.details.value,
                time: new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'})
            });
            localStorage.setItem('reports', JSON.stringify(reports));
            document.getElementById('reportCount').textContent = 12 + reports.length;
            closeModal();
            form.reset();
        });
        
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
    </script>
</body>
</html>
