<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gulf Watch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            line-height: 1.5;
        }
        
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: #000;
            border-bottom: 1px solid #222;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 800; }
        .badge {
            background: #ff4444;
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        /* Status Bar */
        .status {
            background: #1a1a1a;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #888;
        }
        .status span { display: flex; align-items: center; gap: 6px; }
        .status .value { color: #fff; font-weight: 600; }
        
        /* Section */
        .section { padding: 16px; border-bottom: 1px solid #1a1a1a; }
        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Event Cards */
        .event {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .event:hover { background: #1a1a1a; border-color: #333; }
        .event.critical { border-left: 3px solid #ff4444; }
        .event.warning { border-left: 3px solid #ffaa00; }
        .event.info { border-left: 3px solid #1d9bf0; }
        
        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .event-type {
            font-weight: 700;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .event-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        .status-confirmed { background: #002211; color: #00ff88; }
        .status-likely { background: #221100; color: #ffaa00; }
        .status-probable { background: #111133; color: #8888ff; }
        
        .event-location {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .event-desc {
            font-size: 14px;
            color: #ddd;
            line-height: 1.5;
        }
        .event-meta {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
        
        /* Report Button */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #1d9bf0;
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(29,155,240,0.4);
            z-index: 100;
        }
        
        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            z-index: 1000;
        }
        .modal.active { display: block; }
        .modal-content {
            background: #0a0a0a;
            height: 100%;
            overflow-y: auto;
        }
        .modal-header {
            padding: 16px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title { font-size: 18px; font-weight: 700; }
        .close-btn {
            background: #2a2a2a;
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
        .modal-body { padding: 16px; }
        
        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 13px; color: #888; font-weight: 600; margin-bottom: 8px; display: block; }
        textarea, select {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 14px;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
        }
        textarea { min-height: 100px; resize: none; }
        textarea:focus, select:focus { outline: none; border-color: #1d9bf0; }
        
        .submit-btn {
            width: 100%;
            background: #1d9bf0;
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        
        /* Loading */
        .loading { text-align: center; padding: 40px; color: #666; }
        
        /* Empty state */
        .empty { text-align: center; padding: 40px; color: #666; }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">🛡️ Gulf Watch</div>
            <div class="badge">● LIVE</div>
        </header>
        
        <div class="status">
            <select id="regionSelect" onchange="changeRegion()" style="background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 13px;">
                <option value="dubai">🇦🇪 Dubai, UAE</option>
                <option value="abudhabi">🇦🇪 Abu Dhabi, UAE</option>
                <option value="bahrain">🇧🇭 Bahrain</option>
                <option value="qatar">🇶🇦 Qatar</option>
                <option value="saudi">🇸🇦 Saudi Arabia</option>
                <option value="israel">🇮🇱 Israel</option>
                <option value="iran">🇮🇷 Iran</option>
                <option value="lebanon">🇱🇧 Lebanon</option>
                <option value="jordan">🇯🇴 Jordan</option>
                <option value="kuwait">🇰🇼 Kuwait</option>
                <option value="oman">🇴🇲 Oman</option>
            </select>
            <span>🚨 <span class="value" id="alertCount">-</span> alerts</span>
        </div>
        
        <div class="section">
            <div class="section-title">Critical Alerts</div>
            <div id="criticalEvents"></div>
        </div>
        
        <div class="section">
            <div class="section-title">Other Reports</div>
            <div id="otherEvents"></div>
        </div>
        
        <div class="section">
            <div class="section-title">Trending</div>
            <div id="trending"></div>
        </div>
    </div>
    
    <button class="fab" onclick="openModal()">＋</button>
    
    <div class="modal" id="reportModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Report Incident</div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label class="input-label">What happened?</label>
                    <textarea id="reportText" placeholder="Describe what you saw or heard..."></textarea>
                </div>
                <div class="input-group">
                    <label class="input-label">Location</label>
                    <select id="reportLocation">
                        <option>Palm Jumeirah</option>
                        <option>Downtown Dubai</option>
                        <option>Dubai Marina</option>
                        <option>Dubai Creek Harbour</option>
                        <option>Jebel Ali</option>
                        <option>Deira</option>
                        <option>Abu Dhabi</option>
                        <option>Other</option>
                    </select>
                </div>
                <button class="submit-btn" onclick="submitReport()">Submit Report</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001'; // Change to your API URL
        
        // Region coordinates
        const REGIONS = {
            dubai: { lat: 25.2048, lng: 55.2708, name: 'Dubai, UAE' },
            abudhabi: { lat: 24.4539, lng: 54.3773, name: 'Abu Dhabi, UAE' },
            bahrain: { lat: 26.2285, lng: 50.5860, name: 'Bahrain' },
            qatar: { lat: 25.2854, lng: 51.5310, name: 'Qatar' },
            saudi: { lat: 24.7136, lng: 46.6753, name: 'Saudi Arabia' },
            israel: { lat: 32.0853, lng: 34.7818, name: 'Israel' },
            iran: { lat: 35.6892, lng: 51.3890, name: 'Iran' },
            lebanon: { lat: 33.8938, lng: 35.5018, name: 'Lebanon' },
            jordan: { lat: 31.9454, lng: 35.9284, name: 'Jordan' },
            kuwait: { lat: 29.3759, lng: 47.9774, name: 'Kuwait' },
            oman: { lat: 23.5859, lng: 58.4059, name: 'Oman' }
        };
        
        // User location (default to Dubai)
        let userLat = 25.2048;
        let userLng = 55.2708;
        let currentRegion = 'dubai';
        
        function changeRegion() {
            const select = document.getElementById('regionSelect');
            currentRegion = select.value;
            const region = REGIONS[currentRegion];
            userLat = region.lat;
            userLng = region.lng;
            loadEvents();
        }
        
        // Get user location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    loadEvents();
                },
                () => loadEvents()
            );
        } else {
            loadEvents();
        }
        
        async function loadEvents() {
            try {
                const res = await fetch(`${API_URL}/events/nearby?lat=${userLat}&lng=${userLng}&radius=20`);
                const data = await res.json();
                
                document.getElementById('alertCount').textContent = data.events.length;
                
                const critical = data.events.filter(e => e.status === 'CONFIRMED' && ['explosion', 'missile'].includes(e.type));
                const others = data.events.filter(e => !critical.includes(e));
                
                renderEvents('criticalEvents', critical, 'critical');
                renderEvents('otherEvents', others, 'info');
                
            } catch (err) {
                console.error('Failed to load events:', err);
                document.getElementById('criticalEvents').innerHTML = '<div class="loading">Loading...</div>';
            }
        }
        
        function renderEvents(containerId, events, defaultClass) {
            const container = document.getElementById(containerId);
            
            if (events.length === 0) {
                container.innerHTML = '<div class="empty"><div class="empty-icon">🛡️</div>No events to display</div>';
                return;
            }
            
            container.innerHTML = events.map(e => `
                <div class="event ${e.status === 'CONFIRMED' ? 'critical' : e.status === 'LIKELY' ? 'warning' : 'info'}">
                    <div class="event-header">
                        <div class="event-type">${getIcon(e.type)} ${e.type.toUpperCase()}</div>
                        <div class="event-status status-${e.status.toLowerCase()}">${e.status}</div>
                    </div>
                    <div class="event-location">📍 ${e.location}</div>
                    <div class="event-desc">${e.description}</div>
                    <div class="event-meta">
                        <span>📏 ${e.distance_km}km away</span>
                        <span>👥 ${e.sources} sources</span>
                    </div>
                </div>
            `).join('');
        }
        
        function getIcon(type) {
            const icons = {
                explosion: '💥',
                interceptor: '🚀',
                siren: '🚨',
                smoke: '💨',
                drone: '🛸',
                missile: '🚀'
            };
            return icons[type] || '⚠️';
        }
        
        async function loadTrending() {
            try {
                const res = await fetch(`${API_URL}/trending?limit=5`);
                const data = await res.json();
                
                document.getElementById('trending').innerHTML = data.map(t => `
                    <div style="padding: 10px 0; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between;">
                        <span style="color: #1d9bf0; font-weight: 600;">#${t.keyword}</span>
                        <span style="color: #666;">${t.count} posts</span>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Failed to load trending:', err);
            }
        }
        
        function openModal() {
            document.getElementById('reportModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('reportModal').classList.remove('active');
        }
        
        async function submitReport() {
            const text = document.getElementById('reportText').value;
            const location = document.getElementById('reportLocation').value;
            
            if (!text.trim()) return;
            
            try {
                await fetch(`${API_URL}/report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text, location })
                });
                
                closeModal();
                document.getElementById('reportText').value = '';
                loadEvents(); // Refresh
                
            } catch (err) {
                alert('Failed to submit. Please try again.');
            }
        }
        
        // Load data
        loadEvents();
        loadTrending();
        
        // Refresh every 30 seconds
        setInterval(loadEvents, 30000);
    </script>
</body>
</html>
