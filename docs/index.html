<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulf Watch — Live UAE Feed</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
        }
        .app { display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        .header {
            background: #000;
            border-bottom: 1px solid #2a2a3a;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon { font-size: 22px; }
        .logo-text { font-size: 18px; font-weight: 700; }
        .live-badge {
            background: #ff4444;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 10px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .nav-tabs {
            display: flex;
            gap: 4px;
        }
        .nav-tab {
            background: #16181c;
            border: none;
            color: #71767b;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-tab.active {
            background: #fff;
            color: #000;
        }
        
        /* Main Layout */
        .main { flex: 1; display: grid; grid-template-columns: 1fr 380px; overflow: hidden; }
        
        /* Feed Column */
        .feed-column {
            border-right: 1px solid #2a2a3a;
            overflow-y: auto;
            background: #000;
        }
        
        /* Compose Box */
        .compose-box {
            border-bottom: 1px solid #2a2a3a;
            padding: 16px;
            background: #000;
        }
        .compose-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1d9bf0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .compose-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            resize: none;
            min-height: 60px;
            font-family: inherit;
        }
        .compose-input:focus { outline: none; }
        .compose-input::placeholder { color: #71767b; }
        
        .compose-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 56px;
        }
        .compose-tools {
            display: flex;
            gap: 16px;
        }
        .tool-btn {
            background: none;
            border: none;
            color: #1d9bf0;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        .post-btn {
            background: #1d9bf0;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .post-btn:hover { background: #1a8cd8; }
        .post-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Feed */
        .feed { background: #000; }
        .feed-item {
            border-bottom: 1px solid #2a2a3a;
            padding: 16px;
            display: flex;
            gap: 12px;
            transition: background 0.2s;
        }
        .feed-item:hover { background: #080808; }
        
        .feed-content { flex: 1; min-width: 0; }
        .feed-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }
        .feed-author { font-weight: 700; }
        .feed-handle { color: #71767b; }
        .feed-time { color: #71767b; }
        .feed-time::before { content: "· "; }
        .verified-badge { color: #1d9bf0; font-size: 16px; }
        
        .feed-text {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .feed-media {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 12px;
            border: 1px solid #2a2a3a;
            max-height: 400px;
        }
        .feed-media img, .feed-media video {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            display: block;
        }
        
        .feed-meta {
            display: flex;
            gap: 24px;
            color: #71767b;
            font-size: 13px;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .meta-item:hover { color: #1d9bf0; }
        .meta-item.verified { color: #00ff88; }
        .meta-item.unverified { color: #ffaa00; }
        
        .location-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #1d9bf0;
            font-size: 13px;
            margin-top: 8px;
        }
        
        /* Sidebar */
        .sidebar {
            background: #000;
            overflow-y: auto;
            padding: 16px;
        }
        
        .search-box {
            background: #16181c;
            border: 1px solid #2a2a3a;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            flex: 1;
        }
        .search-box input:focus { outline: none; }
        .search-box input::placeholder { color: #71767b; }
        
        /* Trending Card */
        .card {
            background: #16181c;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .card-header {
            padding: 16px;
            font-size: 20px;
            font-weight: 800;
            border-bottom: 1px solid #2a2a3a;
        }
        .trend-item {
            padding: 12px 16px;
            border-bottom: 1px solid #2a2a3a;
            cursor: pointer;
        }
        .trend-item:hover { background: #1e2028; }
        .trend-category { font-size: 13px; color: #71767b; }
        .trend-title { font-size: 15px; font-weight: 700; margin: 4px 0; }
        .trend-count { font-size: 13px; color: #71767b; }
        
        /* Map */
        #map {
            height: 200px;
            border-radius: 12px;
            margin: 16px;
            background: #16181c;
        }
        
        /* Filters */
        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid #2a2a3a;
            overflow-x: auto;
        }
        .filter-btn {
            background: #16181c;
            border: 1px solid #2a2a3a;
            color: #71767b;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: #1d9bf0;
            color: #fff;
            border-color: #1d9bf0;
        }
        
        /* Media Upload Preview */
        .media-preview {
            display: flex;
            gap: 8px;
            padding-left: 56px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .preview-item {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid #2a2a3a;
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-remove {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Mobile */
        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
        
        /* Leaflet custom */
        .leaflet-container { background: #000; }
        
        /* Location Selector in Compose */
        .location-select {
            padding-left: 56px;
            margin-bottom: 12px;
        }
        .location-select select {
            background: #16181c;
            border: 1px solid #2a2a3a;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">Gulf Watch</span>
                <span class="live-badge">LIVE</span>
            </div>
            <nav class="nav-tabs">
                <button class="nav-tab active" onclick="switchTab('feed')">Feed</button>
                <button class="nav-tab" onclick="switchTab('map')">Map</button>
                <button class="nav-tab" onclick="switchTab('gov')">Gov</button>
            </nav>
        </header>
        
        <main class="main">
            <div class="feed-column">
                <!-- Filters -->
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="filterFeed('all')">All</button>
                    <button class="filter-btn" onclick="filterFeed('explosion')">💥 Explosions</button>
                    <button class="filter-btn" onclick="filterFeed('interceptor')">🚀 Interceptors</button>
                    <button class="filter-btn" onclick="filterFeed('siren')">🚨 Sirens</button>
                    <button class="filter-btn" onclick="filterFeed('verified')">✓ Verified</button>
                </div>
                
                <!-- Compose -->
                <div class="compose-box">
                    <div class="compose-header">
                        <div class="avatar">📡</div>
                        <textarea class="compose-input" id="composeInput" placeholder="What did you see or hear?" rows="2"></textarea>
                    </div>
                    <div class="location-select">
                        <select id="locationSelect">
                            <option value="">📍 Select location...</option>
                            <option value="Palm Jumeirah">Palm Jumeirah</option>
                            <option value="Dubai Marina">Dubai Marina</option>
                            <option value="Downtown Dubai">Downtown Dubai</option>
                            <option value="Dubai Creek Harbour">Dubai Creek Harbour</option>
                            <option value="Jebel Ali">Jebel Ali</option>
                            <option value="Deira">Deira</option>
                            <option value="Bur Dubai">Bur Dubai</option>
                            <option value="Business Bay">Business Bay</option>
                            <option value="Abu Dhabi">Abu Dhabi</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="media-preview" id="mediaPreview"></div>
                    <div class="compose-actions">
                        <div class="compose-tools">
                            <button class="tool-btn" onclick="document.getElementById('mediaInput').click()">📷</button>
                            <button class="tool-btn" onclick="document.getElementById('mediaInput').click()">🎥</button>
                            <input type="file" id="mediaInput" accept="image/*,video/*" multiple style="display:none" onchange="handleMedia(event)">
                        </div>
                        <button class="post-btn" id="postBtn" onclick="submitPost()">Post</button>
                    </div>
                </div>
                
                <!-- Feed -->
                <div class="feed" id="feed"></div>
            </div>
            
            <aside class="sidebar">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Search reports...">
                </div>
                
                <div class="card">
                    <div class="card-header">Trending</div>
                    <div class="trend-item">
                        <div class="trend-category">Dubai · Trending</div>
                        <div class="trend-title">#PalmJumeirah</div>
                        <div class="trend-count">2,847 reports</div>
                    </div>
                    <div class="trend-item">
                        <div class="trend-category">UAE · Trending</div>
                        <div class="trend-title">#AirDefense</div>
                        <div class="trend-count">1,923 reports</div>
                    </div>
                    <div class="trend-item">
                        <div class="trend-category">Gulf · Trending</div>
                        <div class="trend-title">#Explosion</div>
                        <div class="trend-count">4,156 reports</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">Live Map</div>
                    <div id="map"></div>
                </div>
                
                <div class="card">
                    <div class="card-header">Stats</div>
                    <div class="trend-item">
                        <div class="trend-category">Total Reports</div>
                        <div class="trend-title">12,847</div>
                    </div>
                    <div class="trend-item">
                        <div class="trend-category">Verified</div>
                        <div class="trend-title" style="color: #00ff88;">3,291</div>
                    </div>
                    <div class="trend-item">
                        <div class="trend-category">Active Cameras</div>
                        <div class="trend-title" style="color: #1d9bf0;">0</div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script>
        // Initialize Leaflet map
        const map = L.map('map', { zoomControl: false }).setView([25.2048, 55.2708], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        // Sample posts (initial data)
        let posts = [
            {
                id: 1,
                author: 'Ahmed @ Creek',
                handle: '@ahmed_dxb',
                verified: true,
                time: '2m',
                text: 'Loud explosion heard from Creek Harbour direction. Saw smoke rising.',
                location: 'Dubai Creek Harbour',
                type: 'explosion',
                verified: true,
                likes: 234,
                replies: 45,
                shares: 89
            },
            {
                id: 2,
                author: 'Dubai Eye',
                handle: '@dubai_eye_1',
                verified: false,
                time: '5m',
                text: '🚨 Air defense interceptors launched over Palm area. Multiple booms.',
                location: 'Palm Jumeirah',
                type: 'interceptor',
                verified: true,
                likes: 1.2,
                replies: 156,
                shares: 432
            },
            {
                id: 3,
                author: 'Sarah M',
                handle: '@sarah_in_dxb',
                verified: false,
                time: '8m',
                text: 'Sirens going off in Downtown. Everyone heading to shelters.',
                location: 'Downtown Dubai',
                type: 'siren',
                verified: false,
                likes: 89,
                replies: 23,
                shares: 45
            },
            {
                id: 4,
                author: 'Civil Defense UAE',
                handle: '@DubaiCivilDef',
                verified: true,
                time: '12m',
                text: 'Official: Interceptor systems activated. Stay indoors, away from windows. Follow official channels only.',
                location: 'Dubai',
                type: 'interceptor',
                verified: true,
                likes: 5.6,
                replies: 892,
                shares: 12.3
            },
            {
                id: 5,
                author: 'Marina Resident',
                handle: '@marina_life',
                verified: false,
                time: '15m',
                text: 'Video: Debris falling near Marina Walk. Stay clear of the area.',
                location: 'Dubai Marina',
                type: 'explosion',
                verified: false,
                likes: 456,
                replies: 67,
                shares: 234
            }
        ];
        
        let currentFilter = 'all';
        let uploadedMedia = [];
        
        // Render feed
        function renderFeed() {
            const feed = document.getElementById('feed');
            const filtered = currentFilter === 'all' 
                ? posts 
                : currentFilter === 'verified' 
                    ? posts.filter(p => p.verified)
                    : posts.filter(p => p.type === currentFilter);
            
            feed.innerHTML = filtered.map(post => `
                <div class="feed-item" data-type="${post.type}">
                    <div class="avatar">${post.author[0]}</div>
                    <div class="feed-content">
                        <div class="feed-header">
                            <span class="feed-author">${post.author}</span>
                            ${post.verified ? '<span class="verified-badge">✓</span>' : ''}
                            <span class="feed-handle">${post.handle}</span>
                            <span class="feed-time">${post.time}</span>
                        </div>
                        <div class="feed-text">${post.text}</div>
                        ${post.media ? `<div class="feed-media">${post.media}</div>` : ''}
                        <div class="location-tag">📍 ${post.location}</div>
                        <div class="feed-meta">
                            <span class="meta-item">💬 ${formatNumber(post.replies)}</span>
                            <span class="meta-item">🔄 ${formatNumber(post.shares)}</span>
                            <span class="meta-item">❤️ ${formatNumber(post.likes)}</span>
                            <span class="meta-item ${post.verified ? 'verified' : 'unverified'}">
                                ${post.verified ? '✓ Verified' : '⏳ Pending'}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function formatNumber(n) {
            if (n >= 1000) return (n/1000).toFixed(1) + 'K';
            return n;
        }
        
        // Filter feed
        function filterFeed(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderFeed();
        }
        
        // Media upload
        function handleMedia(e) {
            const files = Array.from(e.target.files);
            uploadedMedia = files;
            
            const preview = document.getElementById('mediaPreview');
            preview.innerHTML = files.map((file, i) => {
                const url = URL.createObjectURL(file);
                return `
                    <div class="preview-item">
                        <img src="${url}" alt="">
                        <button class="preview-remove" onclick="removeMedia(${i})">×</button>
                    </div>
                `;
            }).join('');
        }
        
        function removeMedia(index) {
            uploadedMedia.splice(index, 1);
            handleMedia({ target: { files: uploadedMedia } });
        }
        
        // Submit post
        function submitPost() {
            const text = document.getElementById('composeInput').value;
            const location = document.getElementById('locationSelect').value;
            
            if (!text.trim()) return;
            
            const newPost = {
                id: Date.now(),
                author: 'You',
                handle: '@anonymous',
                verified: false,
                time: 'now',
                text: text,
                location: location || 'Unknown location',
                type: detectType(text),
                likes: 0,
                replies: 0,
                shares: 0
            };
            
            posts.unshift(newPost);
            renderFeed();
            
            // Reset
            document.getElementById('composeInput').value = '';
            document.getElementById('locationSelect').value = '';
            document.getElementById('mediaPreview').innerHTML = '';
            uploadedMedia = [];
        }
        
        function detectType(text) {
            const lower = text.toLowerCase();
            if (lower.includes('explosion') || lower.includes('boom') || lower.includes('blast')) return 'explosion';
            if (lower.includes('interceptor') || lower.includes('defense') || lower.includes('launch')) return 'interceptor';
            if (lower.includes('siren')) return 'siren';
            if (lower.includes('drone') || lower.includes('uav')) return 'drone';
            return 'other';
        }
        
        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            // In real app, this would switch views
        }
        
        // Initial render
        renderFeed();
        
        // Add markers to map
        const markers = [
            { lat: 25.1156, lng: 55.1284, title: 'Palm Jumeirah' },
            { lat: 25.2048, lng: 55.2708, title: 'Downtown' },
            { lat: 25.0765, lng: 55.1404, title: 'Marina' },
            { lat: 25.2571, lng: 55.2957, title: 'Creek Harbour' },
            { lat: 24.9857, lng: 55.0274, title: 'Jebel Ali' }
        ];
        
        markers.forEach(m => {
            L.circleMarker([m.lat, m.lng], {
                radius: 8,
                fillColor: '#ff4444',
                color: '#fff',
                weight: 2,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(m.title);
        });
    </script>
</body>
</html>
