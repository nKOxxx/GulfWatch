# ============================================
# VERIFICATION RULES
# ============================================

rules:
  # Single source is sufficient for these
  single_source_trusted:
    - type: "ruler"
      min_credibility: 100
    - type: "federal_government"
      min_credibility: 100
    - type: "state_media"
      min_credibility: 100
    - type: "civil_defense"
      min_credibility: 100
    - type: "emergency_management"
      min_credibility: 100
    - type: "police"
      min_credibility: 100
      
  # These still require 2+ sources
  require_multiple:
    - type: "verified_media"
      min_sources: 2
    - type: "transport"
      min_sources: 2
    - type: "airline"
      min_sources: 3
    - type: "tourism"
      min_sources: 3

# ============================================
# PRIORITY LEVELS
# ============================================

priority:
  immediate: ["ruler", "federal_government", "emergency_management", "civil_defense"]
  high: ["police", "state_media", "media_office"]
  medium: ["verified_media", "transport", "municipality"]
  low: ["airline", "tourism", "other"]

# ============================================
# NOTES
# ============================================

# - This list should be reviewed monthly
# - Accounts must be verified (blue check or equivalent)
# - Ruler accounts take precedence over all others
# - Government accounts outrank media accounts
# - Cross-check handles before adding new accounts
# - Remove accounts that become inactive or unverified
