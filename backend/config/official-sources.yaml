# Verification rules
rules:
  single_source_trusted:
    # These source types are trusted as single source of truth
    - type: ruler
      min_credibility: 95
      auto_verify: true
    - type: federal_government
      min_credibility: 95
      auto_verify: true
    - type: civil_defense
      min_credibility: 95
      auto_verify: true
    - type: emergency_management
      min_credibility: 90
      auto_verify: true
      
  require_multiple:
    # These require corroboration even if official
    - type: state_media
      min_sources: 2
      time_window_minutes: 30
    - type: police
      min_sources: 2
      time_window_minutes: 60
    - type: military
      min_sources: 2
      time_window_minutes: 30
      
  auto_verify_keywords:
    # Keywords that trigger immediate verification
    high_confidence:
      - "air defense"
      - "interception"
      - "ballistic missile"
      - "drone"
      - "explosion confirmed"
      - "shelter in place"
      - "emergency alert"
    
    low_confidence:
      - "rumors"
      - "unconfirmed"
      - "allegedly"
      - "reports of"

# Priority levels for incident escalation
priority:
  immediate:
    description: "Immediate action required"
    response_time_minutes: 5
    notification_channels: [push, sms, email]
    
  high:
    description: "High priority"
    response_time_minutes: 15
    notification_channels: [push, email]
    
  medium:
    description: "Medium priority"
    response_time_minutes: 60
    notification_channels: [push]
    
  low:
    description: "Low priority"
    response_time_minutes: 240
    notification_channels: [email]

# Geographical coverage
coverage:
  countries:
    - UAE
    - Saudi Arabia
    - Qatar
    - Bahrain
    - Kuwait        # NEW
    - Israel        # NEW
    - Iran          # NEW
    - Oman
    - Jordan
    - Iraq
    
  primary_regions:
    - "Gulf Cooperation Council"
    - "Eastern Mediterranean"
    - "Strait of Hormuz"
    - "Arabian Gulf"
