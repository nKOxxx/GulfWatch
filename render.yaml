services:
  - type: web
    name: gulf-watch-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: gulf-watch-db
    databaseName: gulfwatch
    user: gulfwatch
    plan: free
